[tox]
envlist = py311,py312,lint,type
isolated_build = True

[testenv]
deps =
    pytest>=8.0.0
    pytest-asyncio>=0.23.0
    pytest-cov>=4.1.0
commands =
    pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=80

[testenv:lint]
deps =
    black>=23.0.0
    ruff>=0.1.0
commands =
    black --check --line-length=100 .
    ruff check .

[testenv:type]
deps =
    mypy>=1.5.0
commands =
    mypy twincat_validator/server.py --ignore-missing-imports --follow-imports=skip

[testenv:format]
deps =
    black>=23.0.0
commands =
    black --line-length=100 .
