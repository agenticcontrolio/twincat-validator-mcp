name: Publish to PyPI (Manual Legacy)

on:
  workflow_dispatch:

jobs:
  deploy:
    # Primary release path is .github/workflows/release.yml (tag -> validate -> build -> publish -> GH release).
    # Keep this workflow as a manual fallback only to avoid duplicate uploads for the same version.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Verify artifacts exclude tests and fixture data
        run: |
          python - <<'PY'
          import glob
          import sys
          import tarfile
          import zipfile

          banned_parts = ("tests/", "tests\\", "fixtures/", "fixtures\\", "golden/", "golden\\")
          errors = []

          wheel_files = glob.glob("dist/*.whl")
          sdist_files = glob.glob("dist/*.tar.gz")

          for whl in wheel_files:
              with zipfile.ZipFile(whl, "r") as zf:
                  names = zf.namelist()
              bad = [n for n in names if any(part in n for part in banned_parts)]
              if bad:
                  errors.append(f"{whl} contains banned paths: {bad[:10]}")

          for tgz in sdist_files:
              with tarfile.open(tgz, "r:gz") as tf:
                  names = tf.getnames()
              bad = [n for n in names if any(part in n for part in banned_parts)]
              if bad:
                  errors.append(f"{tgz} contains banned paths: {bad[:10]}")

          if errors:
              print("Artifact content check failed:")
              for err in errors:
                  print(f"- {err}")
              sys.exit(1)

          print("Artifact content check passed: no tests/fixtures/golden paths found.")
          PY

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
